<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>戀愛巴士來賓查詢系統</title>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        /* 1. 全域復古 Y2K 色調設定 */
        :root {
            --bg-purple: #d8b4fe;     /* 背景粉紫色 */
            --window-bg: #fdf2f8;    /* 視窗內底粉色 */
            --title-pink: #f472b6;   /* 標題列深粉色 */
            --text-dark: #4c1d95;    /* 復古深紫文字色 */
            --border-purple: #a78bfa; /* 像素格點顏色 */
        }

        body {
            background-color: var(--bg-purple);
            /* 復古電腦背景點陣網格效果 */
            background-image: radial-gradient(var(--border-purple) 1px, transparent 1px);
            background-size: 20px 20px;
            font-family: 'Noto Sans TC', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* 2. 復古視窗主元件 (Windows 95/Y2K 風格) */
        .window {
            background: var(--window-bg);
            border: 3px solid var(--text-dark);
            box-shadow: 6px 6px 0px rgba(0, 0, 0, 0.15);
            border-radius: 12px;
            width: 100%;
            max-width: 450px;
            overflow: hidden;
            box-sizing: border-box;
            transition: max-width 0.3s;
        }

        /* 讀取成功後，讓視窗加寬成雙欄網格 */
        .window.expanded {
            max-width: 650px;
        }

        /* 視窗上方的藍/粉色控制列 */
        .title-bar {
            background: var(--title-pink);
            border-bottom: 3px solid var(--text-dark);
            padding: 10px 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            font-weight: bold;
            font-size: 14px;
            letter-spacing: 1px;
        }

        .title-bar span {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .window-controls {
            display: flex;
            gap: 6px;
        }

        /* 視窗右上角經典小按鈕 */
        .control-btn {
            width: 18px;
            height: 18px;
            border: 2px solid white;
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        .window-body {
            padding: 25px;
        }

        /* 3. 登入介面樣式 */
        h2 {
            text-align: center;
            color: var(--text-dark);
            margin-top: 0;
            margin-bottom: 8px;
            font-family: 'ZCOOL KuaiLe', 'Noto Sans TC', sans-serif;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #7c3aed;
            font-size: 14px;
            margin-bottom: 25px;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-dark);
            font-weight: bold;
            font-size: 15px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 3px solid var(--text-dark);
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            background: white;
            color: var(--text-dark);
            outline: none;
        }

        /* 甜酷風粗邊框按鈕 */
        button {
            width: 100%;
            padding: 14px;
            background-color: var(--title-pink);
            color: white;
            border: 3px solid var(--text-dark);
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 4px 4px 0px var(--text-dark);
            transition: all 0.1s;
        }

        button:hover {
            background-color: #ec4899;
        }

        button:active {
            transform: translate(3px, 3px);
            box-shadow: 1px 1px 0px var(--text-dark);
        }

        /* 4. 查詢結果網格佈局 (如同圖片中的卡片排列) */
        .result-box {
            display: none;
            margin-top: 5px;
        }

        .result-box h3 {
            color: var(--text-dark);
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 18px;
            text-align: center;
            border-bottom: 2px dashed var(--title-pink);
            padding-bottom: 10px;
        }

        /* 卡片一左一右雙欄排版 */
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        /* 個別精緻小卡片樣式 */
        .result-item {
            background: white;
            border: 3px solid var(--text-dark);
            border-radius: 10px;
            padding: 14px;
            box-shadow: 3px 3px 0px rgba(0,0,0,0.05);
            position: relative;
            box-sizing: border-box;
        }

        /* 運用偽元素做出小卡片標籤效果 */
        .result-item strong {
            color: white;
            background: var(--text-dark);
            display: inline-block;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 12px;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .result-item span {
            display: block;
            font-size: 15px;
            line-height: 1.5;
            color: #1e1b4b;
            word-break: break-all;
        }

        /* 卡片顏色交錯效果：奇數粉色邊框、偶數藍色邊框 */
        .grid-container .result-item:nth-child(odd) {
            border-color: #f472b6;
        }
        .grid-container .result-item:nth-child(even) {
            border-color: #60a5fa;
        }
        .grid-container .result-item:nth-child(odd) strong {
            background: #f472b6;
        }
        .grid-container .result-item:nth-child(even) strong {
            background: #60a5fa;
        }

        /* 錯誤訊息提示方塊 */
        .error-box {
            margin-top: 20px;
            padding: 12px;
            background: #fee2e2;
            border: 2px solid #ef4444;
            border-radius: 8px;
            color: #b91c1c;
            text-align: center;
            font-weight: bold;
            font-size: 14px;
            display: none;
        }

        /* 5. 手機版響應式自動縮回單欄 */
        @media (max-width: 500px) {
            .grid-container {
                grid-template-columns: 1fr; /* 手機上自動變成直向一條線 */
            }
            .window.expanded {
                max-width: 100%;
            }
            .window-body {
                padding: 18px;
            }
        }
    </style>
</head>
<body>

<div class="window" id="mainWindow">
    <div class="title-bar">
        <span><i class="fa-solid fa-heart"></i> LOVE_BUS_SYSTEM.EXE</span>
        <div class="window-controls">
            <div class="control-btn">_</div>
            <div class="control-btn" onclick="location.reload()">X</div>
        </div>
    </div>
    
    <div class="window-body">
        <div id="loginForm">
            <h2>🚌 戀愛巴士查詢系統</h2>
            <div class="subtitle">輸入綽號即可對應顯示來賓填寫資料</div>
            
            <div class="form-group">
                <label for="nickname"><i class="fa-solid fa-star"></i> 請輸入您的綽號：</label>
                <input type="text" id="nickname" required>
            </div>
            <button onclick="loginAndFetchData()">ENTER 進入系統</button>
        </div>

        <div id="resultBox" class="result-box">
            <h3><i class="fa-solid fa-id-card"></i> ✨ 來賓資料驗證成功 ✨</h3>
            <div id="resultContent" class="grid-container"></div>
        </div>

        <div id="errorBox" class="error-box"></div>
    </div>
</div>

<script>
    // 你的 Google 試算表 JSON 連結
    const sheetUrl = 'https://docs.google.com/spreadsheets/d/1tc-FCMxLN9wJsAK8XPs-jFhj_LW7H16POR7nPeF-8ec/gviz/tq?tqx=out:json';

    async function loginAndFetchData() {
        const inputNickname = document.getElementById('nickname').value.trim();
        const resultBox = document.getElementById('resultBox');
        const errorBox = document.getElementById('errorBox');
        const resultContent = document.getElementById('resultContent');
        const loginForm = document.getElementById('loginForm');
        const mainWindow = document.getElementById('mainWindow');

        // 重置顯示狀態
        errorBox.style.display = 'none';
        resultContent.innerHTML = '';

        if (!inputNickname) {
            showError('請輸入綽號！');
            return;
        }

        try {
            // 讀取 Google Sheet 資料
            const response = await fetch(sheetUrl);
            if (!response.ok) throw new Error('網路請求失敗');
            
            const text = await response.text();
            
            // 清洗並解析 Google Sheet 回傳的 JSON 格式
            const jsonData = JSON.parse(text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1));
            
            // 抓取欄位名稱與各列資料
            const columns = jsonData.table.cols.map(col => col.label ? col.label.trim() : '');
            const rows = jsonData.table.rows;

            // 自動尋找名為「綽號」的欄位索引
            const nicknameIndex = columns.findIndex(col => col === '綽號');

            if (nicknameIndex === -1) {
                showError('在試算表中找不到名為「綽號」的標題欄位。');
                return;
            }

            // 開始比對綽號
            let matchedRowData = null;
            
            for (let row of rows) {
                const cellObj = row.c[nicknameIndex];
                const cellValue = cellObj ? cellObj.v : '';
                
                if (String(cellValue).trim().toLowerCase() === inputNickname.toLowerCase()) {
                    matchedRowData = row.c;
                    break;
                }
            }

            // 如果有找到對應資料
            if (matchedRowData) {
                // 隱藏登入輸入框，並將外框視窗放大給網格卡片用
                loginForm.style.display = 'none';
                mainWindow.classList.add('expanded');

                columns.forEach((colName, index) => {
                    // 排除「時間戳記」，只顯示有意義的填寫內容
                    if (colName && colName !== '時間戳記') { 
                        const cellObj = matchedRowData[index];
                        const value = cellObj ? cellObj.v : '未填寫';
                        
                        // 動態生成彩色格子卡片
                        resultContent.innerHTML += `
                            <div class="result-item">
                                <strong>📍 ${colName}</strong>
                                <span>${value}</span>
                            </div>
                        `;
                    }
                });
                resultBox.style.display = 'block';
            } else {
                showError('找不到此綽號，請確認輸入是否正確。');
            }

        } catch (error) {
            console.error(error);
            showError('讀取失敗！請確保試算表已「發佈到網路」，且網路連線正常。');
        }
    }

    function showError(message) {
        const errorBox = document.getElementById('errorBox');
        errorBox.innerText = message;
        errorBox.style.display = 'block';
    }
</script>

</body>
</html>
