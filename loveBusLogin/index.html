<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>戀愛巴士來賓查詢系統</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fce4ec; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 450px;
            box-sizing: border-box;
        }
        h2 {
            text-align: center;
            color: #d81b60;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: bold;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
            transition: border 0.3s;
        }
        input[type="text"]:focus {
            border-color: #d81b60;
            outline: none;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #e91e63;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #c2185b;
        }
        .result-box {
            margin-top: 25px;
            padding: 20px;
            background: #fff8f9;
            border: 1px solid #f8bbd0;
            border-left: 6px solid #e91e63;
            border-radius: 6px;
            display: none;
        }
        .result-box h3 {
            color: #d81b60;
            margin-top: 0;
            margin-bottom: 15px;
            border-bottom: 1px dashed #f8bbd0;
            padding-bottom: 8px;
        }
        .error-box {
            margin-top: 25px;
            padding: 15px;
            background: #fdf2f2;
            border-left: 5px solid #f44336;
            border-radius: 4px;
            color: #d32f2f;
            display: none;
        }
        .result-item {
            margin-bottom: 12px;
            font-size: 15px;
            line-height: 1.5;
            color: #333;
        }
        .result-item strong {
            color: #880e4f;
            display: block;
            margin-bottom: 2px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🚌 戀愛巴士查詢系統</h2>
    <div class="subtitle">輸入綽號即可對應顯示來賓填寫資料</div>
    
    <div class="form-group">
        <label for="nickname">請輸入您的綽號：</label>
        <input type="text" id="nickname" required>
    </div>
    <button onclick="loginAndFetchData()">登入並查看資料</button>

    <div id="resultBox" class="result-box">
        <h3>✨ 來賓資料驗證成功</h3>
        <div id="resultContent"></div>
    </div>

    <div id="errorBox" class="error-box"></div>
</div>

<script>
    const sheetUrl = 'https://docs.google.com/spreadsheets/d/1tc-FCMxLN9wJsAK8XPs-jFhj_LW7H16POR7nPeF-8ec/gviz/tq?tqx=out:json';

    async function loginAndFetchData() {
        const inputNickname = document.getElementById('nickname').value.trim();
        const resultBox = document.getElementById('resultBox');
        const errorBox = document.getElementById('errorBox');
        const resultContent = document.getElementById('resultContent');

        // 重置顯示狀態
        resultBox.style.display = 'none';
        errorBox.style.display = 'none';
        resultContent.innerHTML = '';

        if (!inputNickname) {
            showError('請輸入綽號！');
            return;
        }

        try {
            // 讀取 Google Sheet 資料
            const response = await fetch(sheetUrl);
            if (!response.ok) throw new Error('網路請求失敗');
            
            const text = await response.text();
            
            // 清洗並解析 Google Sheet 回傳的 JSON 格式
            const jsonData = JSON.parse(text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1));
            
            // 抓取欄位名稱與各列資料
            const columns = jsonData.table.cols.map(col => col.label ? col.label.trim() : '');
            const rows = jsonData.table.rows;

            // 自動尋找名為「綽號」的欄位索引
            const nicknameIndex = columns.findIndex(col => col === '綽號');

            if (nicknameIndex === -1) {
                showError('在試算表中找不到名為「綽號」的標題欄位，請確認試算表第一列設定。');
                return;
            }

            // 開始比對綽號
            let matchedRowData = null;
            
            for (let row of rows) {
                const cellObj = row.c[nicknameIndex];
                // 有些儲存格可能是 null，需要安全讀取值 .v
                const cellValue = cellObj ? cellObj.v : '';
                
                if (String(cellValue).trim().toLowerCase() === inputNickname.toLowerCase()) {
                    matchedRowData = row.c;
                    break;
                }
            }

            // 如果有找到對應資料
            if (matchedRowData) {
                columns.forEach((colName, index) => {
                    // 排除「時間戳記」，只顯示有意義的填寫內容
                    if (colName && colName !== '時間戳記') { 
                        const cellObj = matchedRowData[index];
                        const value = cellObj ? cellObj.v : '未填寫';
                        
                        resultContent.innerHTML += `
                            <div class="result-item">
                                <strong>📍 ${colName}</strong>
                                <span>${value}</span>
                            </div>
                        `;
                    }
                });
                resultBox.style.display = 'block';
            } else {
                showError('找不到此綽號，請確認輸入是否正確（注意空格）。');
            }

        } catch (error) {
            console.error(error);
            showError('讀取試算表失敗！請確保您已將試算表「發佈到網路」，且網址 ID 正確。');
        }
    }

    function showError(message) {
        const errorBox = document.getElementById('errorBox');
        errorBox.innerText = message;
        errorBox.style.display = 'block';
    }
</script>

</body>
</html>
